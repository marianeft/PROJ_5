<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PESO Services — IESIS Portal</title>

  <style>
    html { display: none; } 
  </style>

  <script src="https://www.authpro.com/auth/DICTAuthPro/?action=pp"></script>

  <script>
    document.documentElement.style.display = 'block';
  </script>

  <style>
    :root {
      --font-base: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      --sidebar-bg: #f0f6ff;
      --sidebar-hover-bg: #e4edfd;
      --sidebar-active-bg: #d1e2fc;
      --primary: #4285f4;
      --primary-dark: #1a56c4;
      --text-main: #1f2937;
      --text-muted: #5b6577;
      --border-soft: #d7e6fb;
      --topbar-bg: #1a3a6b;
      --topbar-height: 52px;
      --radius: 6px;
      --gap-base: 20px;
      --transition: 0.2s ease;
      --sidebar-width: 260px;
      --sidebar-collapsed-width: 76px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--font-base);
      color: var(--text-main);
      background-color: #ffffff;
    }

    /* ── Top bar ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar-height);
      background: var(--topbar-bg);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      z-index: 50;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .topbar-logo {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .topbar-logo img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
    }

    .topbar-name {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .topbar-name strong {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .topbar-name span {
      font-size: 10px;
      color: rgba(255,255,255,0.6);
      font-weight: 400;
    }

    .topbar-sep {
      width: 1px;
      height: 28px;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
    }

    .topbar-nav {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
    }

    .topbar-link {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius);
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: background var(--transition), color var(--transition);
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
    }

    .topbar-link:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .topbar-link.active { background: rgba(255,255,255,0.15); color: #fff; }
    .topbar-link svg { width: 15px; height: 15px; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .topbar-help {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      transition: background var(--transition);
    }
    .topbar-help:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .topbar-help svg { width: 15px; height: 15px; }
    .btn-signout {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: var(--radius);
      background: rgba(220,53,69,0.15); border: 1px solid rgba(220,53,69,0.3);
      color: #ff8a8a; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit; text-decoration: none;
      transition: background var(--transition);
    }
    .btn-signout:hover { background: rgba(220,53,69,0.3); color: #ffb3b3; }
    .btn-signout svg { width: 14px; height: 14px; }

    .topbar-user {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px 4px 6px;
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .user-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .user-name { font-size: 12px; color: #fff; font-weight: 500; }

    /* ── Body shell below topbar ── */
    .app-shell {
      padding-top: var(--topbar-height);
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      background-color: var(--sidebar-bg);
      border-right: 1px solid var(--border-soft);
      position: sticky;
      top: var(--topbar-height);
      height: calc(100vh - var(--topbar-height));
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      z-index: 15;
      transition: width 0.25s ease;
    }

    .sidebar.collapsed { width: var(--sidebar-collapsed-width); }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-soft);
    }

    .sidebar.collapsed .sidebar-brand { flex-direction: column; gap: 8px; padding: 12px 8px; }

    .brand-logo {
      width: 40px; height: 40px;
      border-radius: 8px;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }
    .brand-logo img { width: 100%; height: 100%; object-fit: contain; }

    .brand-title { margin: 0; font-size: 15px; font-weight: 600; color: var(--text-main); white-space: nowrap; }
    .sidebar.collapsed .brand-title { display: none; }

    .collapse-toggle {
      margin-left: auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 3px;
      width: 28px; height: 28px;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      background: #fff;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
    }
    .collapse-toggle:hover { background: var(--sidebar-hover-bg); }
    .collapse-toggle span { display: block; width: 12px; height: 2px; background: var(--text-main); border-radius: 2px; }
    .sidebar.collapsed .collapse-toggle { margin-left: 0; }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      padding: 16px 16px 6px;
    }
    .sidebar.collapsed .sidebar-section-label { display: none; }

    .sidebar-nav { flex: 1; padding: 8px; }
    .sidebar-nav ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 2px; }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: var(--radius);
      background: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 13.5px;
      text-align: left;
      cursor: pointer;
      transition: background-color var(--transition), color var(--transition);
    }

    .nav-link svg { width: 17px; height: 17px; flex-shrink: 0; }
    .nav-link:hover { background-color: var(--sidebar-hover-bg); color: var(--text-main); }
    .nav-link.active { background-color: var(--primary); color: #fff; font-weight: 600; }
    .nav-link.active:hover { background-color: var(--primary); }
    .nav-label { white-space: nowrap; }

    .sidebar.collapsed .nav-link { justify-content: center; padding: 10px 0; gap: 0; }
    .sidebar.collapsed .nav-label { display: none; }

    .nav-divider { border: none; border-top: 1px solid var(--border-soft); margin: 8px 4px; }

    .sidebar-footer { padding: 14px; border-top: 1px solid var(--border-soft); }
    .sidebar.collapsed .sidebar-footer { padding: 10px 8px; }

    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px 14px;
      border-radius: var(--radius);
      border: 1.5px solid var(--primary);
      background: transparent;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background var(--transition), color var(--transition);
    }
    .btn-secondary:hover { background: var(--primary); color: #fff; }
    .btn-secondary svg { width: 15px; height: 15px; }
    .sidebar.collapsed .btn-secondary { padding: 10px 0; }
    .sidebar.collapsed .btn-label { display: none; }

    /* ── Mobile toggle ── */
    .mobile-toggle {
      display: none;
      position: fixed;
      top: calc(var(--topbar-height) + 10px);
      left: 12px;
      z-index: 30;
      width: 36px; height: 36px;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      background: #fff;
      cursor: pointer;
      padding: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .mobile-toggle span { display: block; width: 16px; height: 2px; background: var(--text-main); border-radius: 2px; }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.4);
      z-index: 14;
    }

    /* ── Main content ── */
    .main-content { flex: 1; padding: 32px 36px; min-width: 0; }

    .content-page { display: none; }
    .content-page.active { display: block; }
    .content-page:focus { outline: none; }

    .content-eyebrow { color: var(--primary); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; margin: 0 0 6px; }
    .main-content h1 { margin: 0 0 6px; font-size: 26px; font-weight: 700; color: var(--text-main); }
    .page-subtitle { margin: 0 0 28px; color: var(--text-muted); font-size: 14px; max-width: 640px; line-height: 1.6; }

    /* ── Overview quick access cards ── */
    .quick-access-label { font-size: 13px; font-weight: 600; color: var(--text-main); margin: 0 0 14px; }

    .quick-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 36px;
    }

    .quick-card {
      border: 1px solid var(--border-soft);
      border-radius: 10px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fff;
      transition: box-shadow var(--transition), border-color var(--transition);
    }
    .quick-card:hover { box-shadow: 0 4px 16px rgba(66,133,244,0.1); border-color: var(--primary); }

    .quick-card-icon {
      width: 90px; height: 90px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      background: transparent !important;
    }
    .quick-card-icon img { width: 100%; height: 100%; object-fit: contain; }
    .quick-card-icon svg { width: 22px; height: 22px; }

    .quick-card-title { font-size: 14px; font-weight: 600; color: var(--text-main); margin: 0; }
    .quick-card-desc { font-size: 12px; color: var(--text-muted); margin: 0; line-height: 1.5; }

    .quick-card-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: auto;
      padding: 7px 14px;
      border-radius: 5px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity var(--transition);
      text-decoration: none;
      width: fit-content;
    }
    .quick-card-btn:hover { opacity: 0.85; }
    .quick-card-btn svg { width: 13px; height: 13px; }

    /* ── Stat row ── */
    .stat-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--sidebar-bg); border: 1px solid var(--border-soft); border-radius: 8px; padding: 18px; display: flex; align-items: center; gap: 14px; }
    .stat-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .stat-icon svg { width: 20px; height: 20px; }
    .stat-value { font-size: 22px; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .content-placeholder { border: 1.5px dashed var(--border-soft); border-radius: 8px; padding: 48px 20px; text-align: center; color: var(--text-muted); font-size: 14px; }

    a:focus-visible, button:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }

    @media (max-width: 960px) {
      .quick-cards { grid-template-columns: 1fr 1fr; }
      .stat-row { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 880px) {
      .collapse-toggle { display: none; }
      .mobile-toggle { display: flex; }
      .sidebar { position: fixed; top: var(--topbar-height); left: -100%; width: min(var(--sidebar-width), 80vw); height: calc(100vh - var(--topbar-height)); transition: left 0.3s ease; }
      .sidebar.collapsed { width: min(var(--sidebar-width), 80vw); }
      .sidebar.open { left: 0; }
      .sidebar-overlay.open { display: block; }
      .main-content { padding: 24px 20px 24px 60px; }
      .topbar-name span { display: none; }
      .user-name { display: none; }
    }

    @media (max-width: 560px) {
      .quick-cards { grid-template-columns: 1fr; }
      .stat-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
